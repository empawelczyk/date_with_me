<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Date with me</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            overflow-y: auto;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: Georgia, serif;
            background: radial-gradient(circle at top, #fff4f7, #ffd6e3);
            touch-action: manipulation;
        }

        .background-hearts {
            position: fixed;
            inset: 0;
            pointer-events: none;
            overflow: hidden;
        }

        .floating-heart {
            position: absolute;
            bottom: -40px;
            color: rgba(255, 105, 150, 0.3);
            animation: floatUp linear forwards;
        }

        .card {
            width: 90%;
            max-width: 500px;
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 25px;
            text-align: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.15);
            transition: opacity 0.4s ease, transform 0.4s ease;
            position: relative;
            z-index: 2;
        }

        .card.hide {
            opacity: 0;
            transform: scale(0.96);
            pointer-events: none;
        }

        h1 {
            font-size: clamp(30px, 5vw, 42px);
            color: #d94f7d;
            margin-bottom: 5px;
            animation: pulse 2s infinite;
        }

        .subtitle {
            font-size: 16px;
            color: #b85f7c;
            margin-bottom: 15px;
        }

        img {
            width: 100%;
            max-width: 250px;
            max-height: 300px;
            object-fit: cover;
            border-radius: 20px;
            margin: 15px 0;
        }

        .buttons {
            position: relative;
            height: 160px;
            margin-top: 10px;
        }

        button {
            position: absolute;
            padding: 14px 24px;
            font-size: 18px;
            border-radius: 999px;
            border: none;
            cursor: pointer;
            transition: left 0.25s ease, top 0.25s ease, filter 0.2s ease;
            min-width: 110px;
            height: 52px;
            box-sizing: border-box;
            transform: none;
        }

        button:hover {
            filter: brightness(0.95);
        }

        button:active {
            filter: brightness(0.9);
            transform: none;
        }

        button:focus {
            outline: none;
        }

        #yesBtn {
            left: 20px;
            top: 20px;
            background: #ff6b9a;
            color: white;
        }

        #noBtn {
            left: 190px;
            top: 20px;
            right: auto;
            background: #fff;
            color: #d94f7d;
            border: 1px solid pink;
        }

        #result {
            margin-top: 15px;
            font-size: clamp(28px, 5vw, 36px);
            color: #ff4f8b;
            min-height: 40px;
            font-weight: bold;
        }

        #overlay {
            position: fixed;
            inset: 0;
            background: rgba(255, 220, 232, 0.96);
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.8s ease;
            z-index: 999;
            padding: 20px;
            text-align: center;
        }

        #overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        .final-text {
            font-size: clamp(38px, 8vw, 76px);
            line-height: 1.15;
            color: #ff3f7f;
            font-weight: bold;
            text-shadow: 0 6px 18px rgba(255, 90, 140, 0.2);
            animation: wowPop 0.8s ease;
        }

        .sparkle {
            position: absolute;
            font-size: 20px;
            animation: sparkleUp linear forwards;
            pointer-events: none;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        @keyframes floatUp {
            from {
                transform: translateY(0);
                opacity: 0.7;
            }
            to {
                transform: translateY(-110vh);
                opacity: 0;
            }
        }

        @keyframes sparkleUp {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 1;
            }
            100% {
                transform: translateY(-90vh) scale(1.2);
                opacity: 0;
            }
        }

        @keyframes wowPop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            70% {
                transform: scale(1.1);
                opacity: 1;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
    </style>
</head>

<body>

<div class="background-hearts" id="backgroundHearts"></div>

<div class="card" id="card">
    <h1>date with me 18:30 💖</h1>
    <div class="subtitle">so... what do you say? 💕</div>

    <img src="foto.jpeg" alt="Zdjęcie">

    <div class="buttons" id="buttonsBox">
        <button id="yesBtn">YES</button>
        <button id="noBtn">NO</button>
    </div>

    <div id="result"></div>
</div>

<div id="overlay">
    <div class="final-text">YAAAAAY 💘<br>SEE YOU AT 18:30</div>
</div>

<script>
const yesBtn = document.getElementById("yesBtn");
const noBtn = document.getElementById("noBtn");
const result = document.getElementById("result");
const buttonsBox = document.getElementById("buttonsBox");
const backgroundHearts = document.getElementById("backgroundHearts");
const overlay = document.getElementById("overlay");
const card = document.getElementById("card");

function moveNoButton() {
    const maxX = buttonsBox.clientWidth - noBtn.offsetWidth;
    const maxY = buttonsBox.clientHeight - noBtn.offsetHeight;

    const newX = Math.random() * maxX;
    const newY = Math.random() * maxY;

    noBtn.style.right = "auto";
    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";
}

noBtn.addEventListener("mouseenter", moveNoButton);
noBtn.addEventListener("touchstart", function(e) {
    e.preventDefault();
    moveNoButton();
}, { passive: false });

yesBtn.addEventListener("click", function() {
    card.classList.add("hide");

    setTimeout(() => {
        overlay.classList.add("show");
        createBigCelebration();
    }, 350);
});

function createBigCelebration() {
    for (let i = 0; i < 40; i++) {
        const heart = document.createElement("div");
        heart.className = "sparkle";
        heart.textContent = ["💖", "💕", "💘", "💗", "✨", "🌸"][Math.floor(Math.random() * 6)];
        heart.style.left = Math.random() * 100 + "vw";
        heart.style.bottom = "-10px";
        heart.style.fontSize = (18 + Math.random() * 28) + "px";
        heart.style.animationDuration = (2.5 + Math.random() * 2.5) + "s";

        document.body.appendChild(heart);

        setTimeout(() => {
            heart.remove();
        }, 5500);
    }
}

function floatingBackgroundHearts() {
    const heart = document.createElement("div");
    heart.className = "floating-heart";
    heart.textContent = ["💗", "💕", "💖", "♡"][Math.floor(Math.random() * 4)];
    heart.style.left = Math.random() * 100 + "vw";
    heart.style.fontSize = (15 + Math.random() * 25) + "px";
    heart.style.animationDuration = (6 + Math.random() * 5) + "s";

    backgroundHearts.appendChild(heart);

    setTimeout(() => {
        heart.remove();
    }, 11000);
}

setInterval(floatingBackgroundHearts, 700);
</script>

</body>
</html>
